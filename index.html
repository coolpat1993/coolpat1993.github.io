<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SpeedQuizzing Web Prototype</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="phone-frame" aria-label="Game screen">
        <header class="hud">
          <div class="hud-row">
            <div class="hud-score">
              <span id="scoreValue" class="hud-value">0</span>
            </div>
            <div class="timer-track" role="progressbar" aria-label="Question timer" aria-valuemin="0" aria-valuemax="100" aria-valuenow="100">
              <div id="timerFill" class="timer-fill"></div>
            </div>
            <div class="hud-fastest">
              <span id="fastPointsValue" class="hud-value">10</span>
            </div>
          </div>
        </header>

        <section class="question-panel">
          <h1 id="questionText" class="question-text"></h1>
          <p id="feedbackText" class="feedback-text" aria-live="polite"></p>
        </section>

        <section class="answer-panel">
          <div id="numberAnswerDisplay" class="number-answer-display" hidden aria-live="polite"></div>
          <div id="keypad" class="keypad" aria-label="Answer keypad"></div>
          <section id="finishPanel" class="finish-panel" hidden aria-live="polite">
            <div class="finish-card">
              <p class="finish-label">Final score</p>
              <p class="finish-score"><span id="finalScoreValue">0</span><span class="finish-score-separator">/</span><span id="finalScoreTotal">100</span></p>

              <label class="finish-field" for="teamNameInput">
                <span class="finish-field-label">Team name</span>
                <input id="teamNameInput" class="finish-input" type="text" maxlength="32" autocomplete="nickname" placeholder="Enter your team name" />
              </label>

              <div class="finish-actions">
                <button id="shareScoreButton" class="finish-button" type="button">Share score</button>
                <button id="submitScoreButton" class="finish-button finish-button-primary" type="button">Submit to leaderboard</button>
                <button id="devResetProgressButton" class="finish-button" type="button">Dev: clear saved game state</button>
              </div>

              <p id="leaderboardStatus" class="leaderboard-status" aria-live="polite"></p>
            </div>
          </section>
        </section>

        <div class="team-tray">
          <span class="team-tray-name">Team Name</span>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
